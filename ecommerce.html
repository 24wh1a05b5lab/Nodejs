<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BVRIT E-Commerce</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Top Info Bar */
.top-info {
    background-color: #cce7ff; /* Light Blue */
    text-align: center;
    padding: 5px;
    font-weight: bold;
}

/* Header */
header {
    background-color: #cce7ff; /* Light Blue */
    color: black;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
    position: relative;
}

.logo {
    width: 50px;
    position: absolute;
    left: 15px;
}

.title {
    font-size: 24px;
    font-weight: bold;
}

/* Sidebar */
.taskbar {
    background-color: #e6e6fa; /* Lavender */
    height: 100vh;
    padding-top: 20px;
}

.item {
    padding: 15px;
    font-size: 18px;
}

.item a {
    text-decoration: none;
    color: black;
    font-weight: 500;
}

.item:hover {
    background-color: #d8bfd8;
}

/* Iframe */
.iframe-container {
    width: 100%;
    height: 100vh;
    border: none;
}

/* Footer */
footer {
    background-color: #212121;
    color: white;
    text-align: center;
    padding: 10px;
}

</style>
</head>

<body>

<!-- Top Name Section -->
<div class="top-info">
    Name : H.Nanditha | Roll no: 24wh1a05b5
</div>

<!-- Header -->
<header>
    <img src="https://pbs.twimg.com/profile_images/1538007828618588165/ZBzOreDZ_400x400.jpg" class="logo">
    <div class="title">BVRIT E-COMMERCE</div>
</header>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->
<div class="col-md-2 p-0">
    <div class="taskbar">
        <div class="item"><a href="registration.html" target="content">REGISTRATION</a></div>
        <div class="item"><a href="login.html" target="content">LOGIN</a></div>
        <div class="item"><a href="catalog.html" target="content">CATALOG</a></div>
        <div class="item"><a href="cart.html" target="content">CART</a></div>
        <div class="item"><a href="logout.html" target="content">LOGOUT</a></div>
    </div>
</div>

<!-- Content -->
<div class="col-md-10 p-0">
    <iframe name="content" class="iframe-container" src="registration.html"></iframe>
</div>

</div>
</div>

<!-- Footer -->
<footer>
    © 2024 BVRITH. All rights reserved. <br>
    Contact us: info@bvrith.com
</footer>

</body>
</html>
