<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #E8F5E9;
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.logout-box {
    background-color: white;
    padding: 50px 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    text-align: center;
    max-width: 500px;
}

.logout-box h2 {
    color: #2E7D32;
    font-weight: 600;
}

.logout-box p {
    font-size: 1.1rem;
    margin-top: 15px;
    color: #555;
}

.logout-box .btn {
    margin-top: 30px;
    padding: 12px 25px;
    font-size: 1rem;
}
</style>

</head>
<body>

<div class="logout-box">
    <h2>You have been successfully logged out</h2>

    <p>
        Thank you for visiting our e-commerce store! <br>
        We hope to see you again soon.
    </p>

    <a href="login.html" class="btn btn-success">
        Login Again
    </a>
</div>

<script>
// Remove login status when logout page loads
localStorage.removeItem("isLoggedIn");
</script>

</body>
</html>
