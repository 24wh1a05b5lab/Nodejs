<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog Page</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background-color: #E8F5E9;
}

header {
background-color: black;
color: white;
padding: 10px;
text-align: center;
}

nav ul {
list-style-type: none;
padding: 0;
}

nav ul li {
display: inline;
margin-right: 15px;
}

nav ul li a {
color: white;
text-decoration: none;
}

main {
padding: 20px;
text-align: center;
}

.product-grid {
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 20px;
}

.product-item {
background-color: white;
border: 1px solid #ddd;
border-radius: 8px;
padding: 15px;
text-align: center;
width: 250px;
box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.product-item img {
width: 200px;
height: 180px;
object-fit: cover;
border-radius: 6px;
margin-bottom: 10px;
}

.product-item h3 {
margin: 10px 0;
}

.product-item p {
color: #4caf50;
font-weight: bold;
}

.product-item button {
background-color: #4caf50;
color: white;
border: none;
padding: 10px 20px;
border-radius: 4px;
cursor: pointer;
}

.product-item button:hover {
background-color: #45a049;
}

.view-cart-button {
background-color: #ff9800;
color: white;
border: none;
padding: 10px 20px;
border-radius: 4px;
cursor: pointer;
margin-top: 20px;
}

.view-cart-button:hover {
background-color: #e68900;
}
</style>
</head>

<body>

<header>
<h1>My E-Commerce Store</h1>
<nav>
<ul>
<li><a href="ecommerce.html">Home</a></li>
<li><a href="catalog.html">Catalog</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="logout.html" style="background:red;padding:5px 10px;border-radius:4px;">Logout</a></li>
</ul>
</nav>
</header>

<main>
<h2>Product Catalog</h2>

<div class="product-grid">

<div class="product-item">
<img src="books.png" alt="Books">
<h3>Books</h3>
<p>$29.99</p>
<button onclick="addToCart('Books', 29.99)">Add to Cart</button>
</div>

<div class="product-item">
<img src="groceries.png" alt="Groceries">
<h3>Groceries</h3>
<p>$39.99</p>
<button onclick="addToCart('Groceries', 39.99)">Add to Cart</button>
</div>

<div class="product-item">
<img src="makeup.png" alt="Self Care">
<h3>Self Care</h3>
<p>$49.99</p>
<button onclick="addToCart('Self Care', 49.99)">Add to Cart</button>
</div>

</div>

<button class="view-cart-button" onclick="viewCart()">View Cart</button>

</main>

<script>
function addToCart(productName, productPrice) {

let cart = JSON.parse(localStorage.getItem('cart')) || [];

let product = {
name: productName,
price: productPrice,
quantity: 1
};

let existingProduct = cart.find(item => item.name === productName);

if (existingProduct) {
existingProduct.quantity += 1;
} else {
cart.push(product);
}

localStorage.setItem('cart', JSON.stringify(cart));

alert(productName + " added to cart successfully!");
}

function viewCart() {
window.location.href = "cart.html";
}
</script>

</body>
</html>
