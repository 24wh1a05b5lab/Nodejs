<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Page</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Body Background */
body {
    background-color: #E8F5E9;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
}

/* Form Container - Light Pink */
.form-container {
    background-color: #ffe6f0; /* Light Pink */
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    max-width: 700px;
    width: 100%;
}

.form-container h2 {
    text-align: center;
    color: #6a5acd;
    margin-bottom: 25px;
    font-weight: bold;
}

.form-label {
    font-weight: 600;
}

.form-control {
    border-radius: 6px;
    padding: 10px;
}

.form-control:focus {
    border-color: #6a5acd;
    box-shadow: 0 0 5px rgba(106, 90, 205, 0.4);
}

.btn-primary {
    background-color: #6a5acd;
    border: none;
    border-radius: 6px;
    padding: 10px;
    font-size: 16px;
}

.btn-primary:hover {
    background-color: #5a4cb0;
}

.text-center a {
    color: #6a5acd;
    text-decoration: none;
}

.text-center a:hover {
    text-decoration: underline;
}

/* Responsive */
@media (max-width: 768px) {
    .form-container {
        padding: 20px;
        max-width: 90%;
    }
}

</style>
</head>

<body>

<div class="form-container">
<h2>Create Account</h2>

<form id="registrationForm">
<div class="row">

<div class="col-md-6">
<div class="mb-3">
<label for="name" class="form-label">Full Name</label>
<input type="text" id="name" class="form-control" placeholder="Enter your full name" required>
</div>

<div class="mb-3">
<label for="email" class="form-label">Email Address</label>
<input type="email" id="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-3">
<label class="form-label">Gender</label><br>
<input type="radio" name="gender" required> Male
<input type="radio" name="gender" class="ms-3"> Female
<input type="radio" name="gender" class="ms-3"> Other
</div>
</div>

<div class="col-md-6">
<div class="mb-3">
<label for="password" class="form-label">Password</label>
<input type="password" id="password" class="form-control" placeholder="Enter password" required>
</div>

<div class="mb-3">
<label for="confirm-password" class="form-label">Confirm Password</label>
<input type="password" id="confirm-password" class="form-control" placeholder="Confirm password" required>
</div>
</div>

</div>

<button type="submit" class="btn btn-primary w-100">Submit</button>
</form>

<p class="text-center mt-3">
Explore our <a href="catalog.html">Product Catalog</a>
</p>

</div>

<script>
document.getElementById('registrationForm').addEventListener('submit', function(event) {
    event.preventDefault();
    window.location.href = 'login.html';
});
</script>

</body>
</html>
